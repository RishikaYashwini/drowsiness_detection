<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drowsiness Detection</title>
    <style>
        body { font-family: Arial; display: flex; flex-direction: column; align-items: center; background: #1a1a2e; color: white; }
        video { border: 3px solid #e94560; border-radius: 8px; width: 80%; transform: scaleX(-1); }
        #status { margin: 20px; padding: 15px; background: #16213e; border: 1px solid #e94560; }
        .danger { background: red !important; }
    </style>
</head>
<body>
    <h1>Drowsiness Detection</h1>
    <video id="webcam" autoplay playsinline></video>
    <div id="status">Click to Start Detection</div>
    <audio id="beep" src="{{ url_for('static', filename='alert.mp3') }}" loop></audio>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const beep = document.getElementById('beep');
        const canvas = document.createElement('canvas');
        let active = false;

        // Get user camera
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
        });

        window.onclick = () => { active = true; status.innerText = "Monitoring..."; };

        async function sendFrame() {
            if (!active) return;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

            const res = await fetch('/process_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            });
            const data = await res.json();

            if (data.drowsy) {
                status.innerText = "WARNING!";
                status.classList.add('danger');
                if (beep.paused) beep.play();
            } else {
                status.innerText = "Monitoring...";
                status.classList.remove('danger');
                beep.pause();
            }
        }

        setInterval(sendFrame, 300);
    </script>
</body>
</html>
