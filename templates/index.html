<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drowsiness Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #fff;
        }
        h1 {
            margin-bottom: 20px;
        }
        img {
            border: 3px solid #e94560;
            border-radius: 8px;
            max-width: 90%;
        }
        /* ADDED INSTRUCTION BOX STYLING */
        #audio-btn { 
            margin-top: 20px;
            padding: 15px; 
            background: #e94560; 
            border: none; 
            color: white; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Drowsiness Detection System</h1>
    <img src="{{ url_for('video_feed') }}" alt="Video Feed">

    <button id="audio-btn">CLICK HERE TO ENABLE AUDIO</button>

    <audio id="alertSound" src="{{ url_for('static', filename='alert.mp3') }}" loop></audio>

    <script>
        const alertSound = document.getElementById('alertSound');
        const audioBtn = document.getElementById('audio-btn');
        let enabled = false;

        audioBtn.onclick = () => {
            enabled = true;
            audioBtn.innerText = "MONITORING ACTIVE";
            audioBtn.style.background = "#4ecca3";
        };

        async function check() {
            if (!enabled) return;
            try {
                const res = await fetch('/status');
                const data = await res.json();
                if (data.drowsy === true) {
                    if (alertSound.paused) {
                        alertSound.play(); // Beeps ONLY when backend says true
                    }
                } else {
                    alertSound.pause();
                    alertSound.currentTime = 0; // Stops immediately when eyes open
                }
            } catch (e) { console.log("Connection error"); }
        }
        setInterval(check, 200);
    </script>
</body>
</html>
